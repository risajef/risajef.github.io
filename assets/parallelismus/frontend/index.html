<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Parallelismus Demo</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>Parallelismus Demo</h1>
      </header>
      <div class="app-shell">
        <div class="main-column">
          <div class="card controls">
            <label
              >Book:
              <select id="books"></select
            ></label>
            <label
              >Chapter:
              <select id="chapters"></select
            ></label>
            <button id="next-chapter" title="Go to next chapter">Next ▶</button>
            <label
              >Verse:
              <select id="verses"></select
            ></label>
            <button id="next-verse" title="Go to next verse">Next ▶</button>
          </div>

          <div class="card words">
            <ul id="words"></ul>
          </div>
        </div>

        <aside class="side-column">
          <div class="card" id="relations-panel">
            <div
              style="
                display: flex;
                gap: 8px;
                align-items: center;
                margin-bottom: 8px;
              "
            >
              <input
                id="relations-strong"
                placeholder="strong id"
                style="flex: 1"
              />
              <button id="showRelations">Show Relations</button>
            </div>
            <div id="relations-list"></div>
          </div>

          <div class="card" id="add-relation-panel">
            <div class="add-relation-form">
              <label class="form-label"
                >Relation type
                <select id="type">
                  <option value="">— select —</option>
                  <option value="composes">composes (a,b,c → set)</option>
                  <option value="opposite">opposite</option>
                  <option value="similar">similar</option>
                  <option value="element_of">element of</option>
                  <option value="subset_of">subset of</option>
                  <option value="attribute_of">attribute of</option>
                </select>
              </label>

              <div id="binary-fields">
                <input id="src" placeholder="source (a)" />
                <input id="tgt" placeholder="target (b / A)" />
              </div>

              <div id="compose-fields" class="compose-fields" hidden>
                <div class="form-label">Members</div>
                <div id="members-list" class="members-list"></div>
                <div class="member-add-row">
                  <input id="member-input" placeholder="strong id" />
                  <button id="add-member" type="button" title="Add member">
                    +
                  </button>
                </div>
                <input id="compose-target" placeholder="set / target strong" />
              </div>

              <div class="action-row">
                <button id="addRel">Add Relation</button>
                <button
                  id="shortcutInfo"
                  title="Keyboard shortcuts"
                  aria-label="Keyboard shortcuts"
                >
                  ℹ️
                </button>
              </div>
              <div id="result"></div>
            </div>
          </div>
        </aside>
      </div>
    </div>

    <script type="module" src="/static/index.js"></script>
  </body>
</html>
