<!DOCTYPE html>
<html lang="en" data-theme="amethyst">
  <head>
    <meta charset="utf-8" />
    <title>Background Generator Playground</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../../../theme/risajef-theme.css" />
  </head>
  <body class="rjs-styled">
    <link rel="stylesheet" href="./styles.css" />
    <main>
      <section>
        <h1>Generator Controls</h1>
        <form id="generator-form">
          <label>
            Generator
            <select id="generator-select"></select>
          </label>
          <div id="dynamic-fields"></div>
          <button type="submit">Generate</button>
        </form>
      </section>
      <section class="preview-panel">
        <header>
          <div>
            <strong>Preview</strong>
            <div id="meta"></div>
          </div>
          <div class="preview-actions">
            <button type="button" id="download-svg" disabled>
              Download SVG
            </button>
            <button type="button" id="download-png" disabled>
              Download PNG
            </button>
          </div>
        </header>
        <div class="preview-area" id="preview">
          Fill out the form and generate a scene.
        </div>
        <label>
          SVG Markup
          <textarea id="svg-output" readonly></textarea>
        </label>
      </section>
    </main>
    <script type="module" src="./dist/app.js"></script>
  </body>
</html>
