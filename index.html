 <!DOCTYPE html>
<html>
<head>
<style>
body {
    background-color: black;
    color: white;
    font-size: 40px;
    margin-top: 40px;
}
button {
    font-size: 40px;
    background: #ccc;
    width: 100px;
    height: 100px;
    margin: 20px;
    border: 0px;
}
button:hover {
    background: #fff;
}
button:active {
    background: #ff5555;
}
#display {
    background: white;
    color: orange;
    text-align: right;
    padding: 10px;
    height: 50px;
}
</style>
<script>
let code = window.location.search;
code = code.substring(1);
let enterCode = "";
const successMessage = "Bombe entschärft!"; 

function addNumber(n) {
    enterCode = enterCode + n;
    document.getElementById("display").innerHTML = enterCode;
}

function clearNumber() {
    enterCode = "";
    document.getElementById("display").innerHTML = enterCode;
    document.getElementById("display").style.backgroundColor = "white";
}

function success() {
    enterCode = successMessage;
    document.body.style.backgroundColor = "white";
    document.getElementById("display").innerHTML = enterCode;
    document.getElementById("display").style.backgroundColor = "#0f0";
}

function fail() {
    enterCode = "FALSCHER CODE!!!";
    document.body.style.backgroundColor = "black";
    document.getElementById("display").innerHTML = enterCode;
    document.getElementById("display").style.backgroundColor = "#f00";
}
function check() {
    console.log(enterCode, code, successMessage);
    if((enterCode === code) || (enterCode === successMessage)){
        success()
    } else {
        fail()
    }
}


</script>
</head>
<body>
<table>
<tr>
<td colspan="3" id="display"></td>
</tr>
<tr>
<td><button onClick="addNumber('1')">1</button></td>
<td><button onClick="addNumber('2')">2</button></td>
<td><button onClick="addNumber('3')">3</button></td>
</tr>
<tr>
<td><button onClick="addNumber('4')">4</button></td>
<td><button onClick="addNumber('5')">5</button></td>
<td><button onClick="addNumber('6')">6</button></td>
</tr>
<tr>
<td><button onClick="addNumber('7')">7</button></td>
<td><button onClick="addNumber('8')">8</button></td>
<td><button onClick="addNumber('9')">9</button></td>
</tr>
<tr>
<td><button style="background:#ff0000; font-size:30px" onClick="clearNumber()">Clear</button></td>
<td><button onClick="addNumber('0')">0</button></td>
<td><button onClick="check()" style="background:#00ff00">OK</button></td>
</tr>
</table>
<body>
</html>
