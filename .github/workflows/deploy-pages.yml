name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out site sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Mermaid CLI
        run: |
          npm ci
          echo "$GITHUB_WORKSPACE/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Install locked site dependencies
        run: uv sync --frozen

      - name: Restore runtime assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download runtime-assets-v2 \
            --repo "$GITHUB_REPOSITORY" \
            --pattern 'runtime-assets-v2.tar.gz*' \
            --dir "$RUNNER_TEMP"
          cd "$RUNNER_TEMP"
          sha256sum --check runtime-assets-v2.tar.gz.sha256
          npm run install-runtime-assets -- --archive "$RUNNER_TEMP/runtime-assets-v2.tar.gz"

      - name: Build embedded tools
        run: npm run build-tools

      - name: Build site
        env:
          PIPER_TTS_GENERATE_AUDIO: "false"
        run: npm run check-site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
