name: Monthly dependency audit

on:
  schedule:
    - cron: "17 3 1 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: astral-sh/setup-uv@v6

      - name: Audit Python production dependencies
        run: |
          uv export --frozen --no-dev --no-emit-project --output-file "$RUNNER_TEMP/requirements.txt"
          uvx pip-audit --disable-pip -r "$RUNNER_TEMP/requirements.txt"

      - name: Audit Node production dependencies
        run: |
          npm audit --omit=dev --audit-level=moderate
          for app in python-blocks hoare-logic xml-weaver background-generator parallelismus; do
            npm --prefix "docs/assets/$app" audit --omit=dev --audit-level=moderate
          done

      - name: Report build dependency vulnerabilities
        run: |
          mkdir -p audit-reports
          uv export --frozen --all-groups --no-emit-project --output-file "$RUNNER_TEMP/all-requirements.txt"
          uvx pip-audit --disable-pip --format json -r "$RUNNER_TEMP/all-requirements.txt" > audit-reports/python-all.json || true
          npm audit --json > audit-reports/root.json || true
          for app in python-blocks hoare-logic xml-weaver background-generator parallelismus; do
            npm --prefix "docs/assets/$app" audit --json > "audit-reports/$app.json" || true
          done

      - name: Upload build dependency audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-dependency-audit-${{ github.run_id }}
          path: audit-reports
          if-no-files-found: error