name: Deploy Example Pages

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: example-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install audio encoder
        run: sudo apt-get update && sudo apt-get install --yes ffmpeg

      - name: Install package and test dependencies
        run: python -m pip install --upgrade pip && python -m pip install '.[test]'

      - name: Deploy fresh CPU example site with MkDocs
        env:
          MODEL_DIR: ${{ runner.temp }}/piper-test-model
          PIPER_TTS_TEST_MODEL_DIR: ${{ runner.temp }}/piper-test-model
        run: |
          rm -rf "$MODEL_DIR" "$HOME/.cache/mkdocs-piper-tts"
          python -m pytest tests/test_example_e2e.py -q -m 'not cuda'
          cp "$MODEL_DIR"/* examples/simple-site/models/
          cat > examples/simple-site/docs/e2e-status.md <<EOF
          ---
          title: E2E Build Status
          ---

          # E2E Build Status

          CPU end-to-end test: passed

          Package: ${GITHUB_REF_NAME}

          Built: $(date --utc +%Y-%m-%dT%H:%M:%SZ)
          EOF
          python -m mkdocs gh-deploy --config-file examples/simple-site/mkdocs.yml --strict --forc