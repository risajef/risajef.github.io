site_name: Reto Weber
site_url: https://retoweber.info
site_author: Reto Weber
site_description: Essays, research notes, and blog entries by Reto Weber.
theme:
  name: null
  custom_dir: theme
nav:
  - CV:
      - CV: cv.md
      - Programming: programming.md
      - Research: research.md
  - Tools:
      - Buchfaltstudio: tools/buchfaltstudio.md
      - Background Generator: tools/background-generator.md
      - Parallelismus: tools/parallelismus.md
      - Python Blocks: tools/python-blocks.md
      - Hoare Logic: tools/hoare-logic.md
  - Politik:
      # - Zonenplanänderung: politik/zonenplanaenderung.md
      # - Werkhof Baukredit: politik/werkhof-baukredit.md
      - Finanzen Beringen: politik/finanzen-beringen.md
    # - E-ID: politik/e-id.md
  - Blog:
      - Thoughts: blog/thoughts.md
      - Philosophy: blog/philosophy.md
      - Science: blog/science.md
      - Book:
        - Book: book.md
        - The Book: book/the-book.md
        - Influential Books: book/influential-books.md
        - Lessons from My Book: book/lessons-from-my-book.md

plugins:
  - i18n:
      default_language: de
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
        - locale: de
          name: Deutsch
  - search
  - mermaid-to-svg:
      mmdc_path: 'mmdc'
      cleanup_generated_images: false
      process_in_serve: true
  - inline-select-svg
  - bibtex:
      bib_file: references.bib
      bib_by_default: false
  - exclude:
      glob:
        - 'private/*'
        - 'private/**/*'
        - 'assets/*/node_modules/**'
        - 'assets/*/README.md'
        - 'assets/*/Description.md'
  - rss:
      match_path: '^blog/(thoughts|philosophy|science)/'
      length: 20
      abstract_chars_count: 240
      use_git: true
      feeds_filenames:
        rss_created: rss.xml
        rss_updated: rss-updated.xml
        json_created: feed.json
        json_updated: feed-updated.json
markdown_extensions:
  - footnotes
  - mdx_math
  - attr_list
  - pymdownx.snippets:
      base_path: docs
      check_paths: true
extra_javascript:
  - https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.4/MathJax.js?config=TeX-AMS-MML_HTMLorMML
  - assets/rss-feed.js
extra_css:
  - assets/rss-feed.css
hooks:
  - hooks/auto_snippets.py
extra:
  redirects:
    programming/buchfaltstudio: tools/buchfaltstudio
    de/programming/buchfaltstudio: de/tools/buchfaltstudio
    programming/background-generator: tools/background-generator
    de/programming/background-generator: de/tools/background-generator
    programming/parallelismus: tools/parallelismus
    de/programming/parallelismus: de/tools/parallelismus
    programming/python-blocks: tools/python-blocks
    de/programming/python-blocks: de/tools/python-blocks
    programming/hoare-logic: tools/hoare-logic
    de/programming/hoare-logic: de/tools/hoare-logic
    politics: politik
    politics/zonenplanaenderung: politik/zonenplanaenderung
    politics/finanzen-beringen: politik/finanzen-beringen
    politics/e-id: politik/e-id
    research/buchfaltstudio: tools/buchfaltstudio
    de/research/buchfaltstudio: de/tools/buchfaltstudio
  translations:
    en:
      auto_translation_title: 'Automated translation.'
      auto_translation_from_lang: 'This page was machine translated from {lang} and may contain mistakes.'
      auto_translation_generic: 'This page was machine translated and may contain mistakes.'
      nav:
        CV: CV
